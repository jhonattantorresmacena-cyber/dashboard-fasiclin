<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FASICLIN • Gestão Inteligente</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #f5f6fa;
  margin: 20px;
}

h1 {
  margin-bottom: 20px;
}

.cards {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
}

.card {
  flex: 1;
  background: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.valor {
  font-size: 28px;
  color: green;
}

.graficos {
  display: flex;
  gap: 20px;
}

canvas {
  background: white;
  border-radius: 10px;
  padding: 10px;
}
</style>
</head>

<body>

<h1>FASICLIN • Gestão Inteligente</h1>

<div class="cards">
  <div class="card">
    <h3>Total</h3>
    <div id="total" class="valor">0</div>
  </div>
  <div class="card">
    <h3>Faturamento</h3>
    <div id="faturamento" class="valor">R$ 0</div>
  </div>
  <div class="card">
    <h3>Eficiência</h3>
    <div id="eficiencia" class="valor">0%</div>
  </div>
</div>

<div class="graficos">
  <canvas id="grafico1"></canvas>
  <canvas id="grafico2"></canvas>
</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTV14Ylz2lkaCPJEyR7lJHHbVfO7qD4hGwTaqoCxHC8I1vIuwU_2X0idkNswPkO8tum1kmScpspHo5A/pub?output=csv";

async function carregarDados() {
  try {
    const res = await fetch(URL);
    const texto = await res.text();

    const linhas = texto.split("\n");

    let dados = [];

    for (let i = 1; i < linhas.length; i++) {
      const col = linhas[i].split(",");

      if (col.length < 4) continue;

      let data = col[0]?.trim();
      let procedimento = col[1]?.trim();
      let valor = col[2]?.trim();
      let quantidade = col[3]?.trim();

      // limpar valor
      valor = valor
        ?.replace("R$", "")
        .replace(/\./g, "")
        .replace(",", ".")
        .trim();

      valor = parseFloat(valor);
      quantidade = parseFloat(quantidade);

      // validação forte (ANTI BUG)
      if (!data || !procedimento) continue;
      if (isNaN(valor)) valor = 0;
      if (isNaN(quantidade)) quantidade = 0;

      dados.push({
        data,
        procedimento,
        valor,
        quantidade
      });
    }

    console.log("Dados tratados:", dados);

    atualizarDashboard(dados);

  } catch (e) {
    alert("Erro ao carregar dados");
    console.error(e);
  }
}

function atualizarDashboard(dados) {

  if (!dados.length) {
    console.warn("Sem dados válidos");
    return;
  }

  let total = 0;
  let faturamento = 0;

  let mapa = {};

  dados.forEach(d => {
    total += d.quantidade;
    faturamento += d.valor;

    if (!mapa[d.procedimento]) {
      mapa[d.procedimento] = 0;
    }
    mapa[d.procedimento] += d.valor;
  });

  const eficiencia = total > 0 ? (faturamento / total).toFixed(2) : 0;

  // UI
  document.getElementById("total").innerText = total;
  document.getElementById("faturamento").innerText = "R$ " + faturamento.toFixed(2);
  document.getElementById("eficiencia").innerText = eficiencia + "%";

  // gráfico
  const labels = Object.keys(mapa);
  const valores = Object.values(mapa);

  new Chart(document.getElementById("grafico1"), {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Faturamento",
        data: valores
      }]
    }
  });

  new Chart(document.getElementById("grafico2"), {
    type: "pie",
    data: {
      labels: labels,
      datasets: [{
        data: valores
      }]
    }
  });
}

carregarDados();

</script>

</body>
</html>
