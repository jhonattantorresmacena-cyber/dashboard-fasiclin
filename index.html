<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FASICLIN - Dashboard Premium</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="styles/global.css">

</head>

<body>

<div class="container">

<div class="card">
<select id="procSelect" onchange="filterData()"></select>
<div id="months"></div>
</div>

<div class="stats">
<div class="card stat"><p>Total</p><h2 id="qtd">0</h2></div>
<div class="card stat"><p>Faturamento</p><h2 id="valor">0</h2></div>
<div class="card stat"><p>Eficiência</p><h2 id="meta">0%</h2></div>
</div>

<div class="card">
<canvas id="metaChart"></canvas>
</div>

<div class="card">
<canvas id="procChart"></canvas>
</div>

<div class="card">
<canvas id="turmaChart"></canvas>
</div>

<div class="card">
<canvas id="clinicaChart"></canvas>
</div>

</div>

<script>

// 🔥 COLE AQUI SEU LINK PUBLICADO CSV
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTV14Ylz2lkaCPJEyR7lJHHbVfO7qD4hGwTaqoCxHC8I1vIuwU_2X0idkNswPkO8tum1kmScpspHo5A/pub?output=csv";

// VARIÁVEIS
let rawData=[];
let selectedMonth="TODOS";
let charts={};

// 🚀 INIT
window.onload = fetchData;

async function fetchData(){
try{
const res = await fetch(SHEET_URL);
const text = await res.text();

const rows = text.split("\n").map(r => r.split(","));

const headers = rows[0];

rawData = rows.slice(1).map(row => {
    let obj = {};
    headers.forEach((h,i)=>{
        obj[h.trim()] = row[i];
    });
    return obj;
});

console.log("DADOS:", rawData);

populateFilters();
update(rawData);

}catch(e){
alert("Erro ao carregar planilha");
console.error(e);
}
}

// 🎯 FILTROS
function populateFilters(){

// PROCEDIMENTO
let select=document.getElementById('procSelect');
let procs=[...new Set(rawData.map(r=>getVal(r,'PROCEDIMENTO')))].sort();

select.innerHTML='<option value="TODOS">Todos</option>';
procs.forEach(p=>select.innerHTML+=`<option>${p}</option>`);

// MESES
let div=document.getElementById('months');
let meses=[...new Set(rawData.map(r=>{
let d=parseDate(getVal(r,'DATA'));
return d?d.toLocaleString('pt-BR',{month:'short',year:'numeric'}):null;
}))].filter(Boolean);

div.innerHTML='<button onclick="setMonth(\'TODOS\')">Todos</button>';
meses.forEach(m=>{
div.innerHTML+=`<button onclick="setMonth('${m}')">${m}</button>`;
});
}

function setMonth(m){
selectedMonth=m;
filterData();
}

function filterData(){
let proc=document.getElementById('procSelect').value;

let data=rawData.filter(r=>{
let d=parseDate(getVal(r,'DATA'));
let m=d?d.toLocaleString('pt-BR',{month:'short',year:'numeric'}):"";

return (selectedMonth==="TODOS"||m===selectedMonth) &&
(proc==="TODOS"||getVal(r,'PROCEDIMENTO')===proc);
});

update(data);
}

// 📊 DASHBOARD
function update(data){

let qtd=0,val=0;
let procMap={}, turmaMap={}, clinicaMap={}, metaMap={};

data.forEach(r=>{
let q=clean(getVal(r,'QUANTIDADE'));
let v=clean(getVal(r,'VALOR TOTAL'));

let proc=getVal(r,'PROCEDIMENTO');
let turma=getVal(r,'TURMA');
let clinica=getVal(r,'CLINICA');

qtd+=q;
val+=v;

procMap[proc]=(procMap[proc]||0)+v;
turmaMap[turma]=(turmaMap[turma]||0)+q;
clinicaMap[clinica]=(clinicaMap[clinica]||0)+q;

let d=parseDate(getVal(r,'DATA'));
if(d){
let ds=d.toLocaleDateString();
if(!metaMap[ds]) metaMap[ds]={r:0,m:40};
metaMap[ds].r+=q;
}
});

// CARDS
document.getElementById('qtd').innerText=qtd;
document.getElementById('valor').innerText=val.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
document.getElementById('meta').innerText=data.length?Math.round(qtd/(data.length*40)*100)+'%':'0%';

// GRÁFICOS
render(metaMap,procMap,turmaMap,clinicaMap);
}

// 📈 GRÁFICOS
function render(metaMap,procMap,turmaMap,clinicaMap){

Object.values(charts).forEach(c=>c.destroy());

charts.meta=new Chart(metaChart,{
type:'line',
data:{
labels:Object.keys(metaMap),
datasets:[
{label:'Real',data:Object.values(metaMap).map(x=>x.r),borderColor:'green'},
{label:'Meta',data:Object.values(metaMap).map(x=>x.m),borderColor:'red'}
]
}
});

charts.proc=new Chart(procChart,{
type:'bar',
data:{labels:Object.keys(procMap),datasets:[{data:Object.values(procMap),backgroundColor:'green'}]}
});

charts.turma=new Chart(turmaChart,{
type:'pie',
data:{labels:Object.keys(turmaMap),datasets:[{data:Object.values(turmaMap)}]}
});

charts.clinica=new Chart(clinicaChart,{
type:'doughnut',
data:{labels:Object.keys(clinicaMap),datasets:[{data:Object.values(clinicaMap)}]}
});
}

// 🧠 HELPERS
function getVal(r,k){
let key=Object.keys(r).find(x=>x.toUpperCase().includes(k));
return key?r[key]:"";
}

function clean(v){
if(!v) return 0;
return parseFloat(v.toString().replace(/[R$\s.]/g,'').replace(',','.'))||0;
}

function parseDate(d){
if(!d) return null;
let p=d.split('/');
return p.length===3?new Date(p[2],p[1]-1,p[0]):new Date(d);
}

</script>

</body>
</html>
