<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FASICLIN • Gestão Inteligente</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f4f6f9; margin:0; }
header { padding:20px; font-size:22px; font-weight:bold; }
.container { padding:20px; }

.filtros {
  display:flex; gap:10px; flex-wrap:wrap;
}
select {
  padding:8px; border-radius:6px;
}

.cards {
  display:flex; gap:20px; margin-top:20px;
}
.card {
  flex:1; background:white; padding:20px;
  border-radius:10px; text-align:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
.valor {
  font-size:26px; color:green;
}

.grid {
  display:flex; gap:20px; margin-top:20px;
}
.box {
  flex:1; background:white; padding:20px;
  border-radius:10px;
}

ul { padding:0; list-style:none; }
li { padding:5px 0; }
</style>
</head>

<body>

<header>FASICLIN • Gestão Inteligente</header>

<div class="container">

<!-- FILTROS -->
<div class="filtros">
  <select id="fProcedimento"></select>
  <select id="fClinica"></select>
  <select id="fTurma"></select>
  <select id="fMes"></select>
</div>

<!-- KPIs -->
<div class="cards">
  <div class="card">
    <div>Total</div>
    <div id="total" class="valor">0</div>
  </div>

  <div class="card">
    <div>Faturamento</div>
    <div id="faturamento" class="valor">R$ 0</div>
  </div>

  <div class="card">
    <div>Eficiência</div>
    <div id="eficiencia" class="valor">0%</div>
  </div>
</div>

<!-- GRÁFICOS -->
<div class="grid">
  <div class="box">
    <h3>Faturamento por Procedimento</h3>
    <canvas id="grafico"></canvas>
  </div>

  <div class="box">
    <h3>Ranking</h3>
    <ul id="ranking"></ul>
  </div>
</div>

</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTV14Ylz2lkaCPJEyR7lJHHbVfO7qD4hGwTaqoCxHC8I1vIuwU_2X0idkNswPkO8tum1kmScpspHo5A/pub?output=csv";

let dados = [];
let chart;

// ===== UTILS =====
function toNumber(v){
  if(!v) return 0;
  return parseFloat(v.replace("R$","").replace(/\./g,"").replace(",",".").trim()) || 0;
}

// ===== FETCH =====
async function fetchData(){
  try{
    const res = await fetch(CSV_URL);
    const text = await res.text();

    const linhas = text.split("\n").map(l=>l.split(","));

    dados = linhas.slice(1)
      .map(l=>({
        DATA:l[0],
        PROCEDIMENTO:l[1],
        QUANTIDADE:l[2],
        CLINICA:l[5],
        TURMA:l[6],
        VALOR:l[4]
      }))
      .filter(l=>l.DATA && !l.DATA.includes("TOTAL"));

    initFiltros();
    atualizar();

  }catch(e){
    alert("Erro ao carregar dados");
    console.error(e);
  }
}

// ===== FILTROS =====
function initFiltros(){

  preencher("fProcedimento", [...new Set(dados.map(d=>d.PROCEDIMENTO))]);
  preencher("fClinica", [...new Set(dados.map(d=>d.CLINICA))]);
  preencher("fTurma", [...new Set(dados.map(d=>d.TURMA))]);

  preencher("fMes", ["Todos","01","02","03","04","05","06","07","08","09","10","11","12"]);

  document.querySelectorAll("select").forEach(s=>{
    s.addEventListener("change", atualizar);
  });
}

function preencher(id, lista){
  const el = document.getElementById(id);
  el.innerHTML = "<option value='Todos'>Todos</option>";
  lista.forEach(v=>{
    if(v) el.innerHTML += `<option>${v}</option>`;
  });
}

// ===== FILTRAGEM =====
function aplicarFiltros(){
  const p = fProcedimento.value;
  const c = fClinica.value;
  const t = fTurma.value;
  const m = fMes.value;

  return dados.filter(d=>{
    const mes = d.DATA?.split("/")[1];

    return (p==="Todos"||d.PROCEDIMENTO===p) &&
           (c==="Todos"||d.CLINICA===c) &&
           (t==="Todos"||d.TURMA===t) &&
           (m==="Todos"||mes===m);
  });
}

// ===== DASHBOARD =====
function atualizar(){

  const base = aplicarFiltros();

  let total=0, fat=0;
  const map={};

  base.forEach(d=>{
    const qtd=parseInt(d.QUANTIDADE)||0;
    const val=toNumber(d.VALOR);

    total+=qtd;
    fat+=val;

    if(!map[d.PROCEDIMENTO]) map[d.PROCEDIMENTO]=0;
    map[d.PROCEDIMENTO]+=val;
  });

  const eficiencia = total? fat/total:0;

  totalEl.innerText=total;
  faturamentoEl.innerText="R$ "+fat.toLocaleString("pt-BR");
  eficienciaEl.innerText=eficiencia.toFixed(2)+"%";

  renderGrafico(map);
  renderRanking(map);
}

// ===== GRÁFICO =====
function renderGrafico(map){
  const labels=Object.keys(map);
  const valores=Object.values(map);

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("grafico"),{
    type:"bar",
    data:{labels,datasets:[{label:"R$",data:valores}]}
  });
}

// ===== RANKING =====
function renderRanking(map){
  const lista = Object.entries(map)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,10);

  ranking.innerHTML="";
  lista.forEach(r=>{
    ranking.innerHTML+=`<li>${r[0]} - R$ ${r[1].toLocaleString("pt-BR")}</li>`;
  });
}

// INIT
fetchData();
</script>

</body>
</html>
