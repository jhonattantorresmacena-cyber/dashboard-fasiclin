<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Fasiclin | Gestão Clínica</title>
    
    <link rel="stylesheet" href="assets/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <p>Processando dados...</p>
    </div>

    <header>
        <div class="header-content">
            <div class="logo">
                <img src="assets/image/logo.png" alt="Fasiclin Logo">
                <span>Gestão Clínica</span>
            </div>
            <div class="actions">
                <button class="btn-export" onclick="exportPDF()">
                    <i>📄</i> Exportar Relatório PDF
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="filter-bar">
            <div class="filter-group">
                <label for="proc">🎯 Procedimento</label>
                <select id="proc"></select>
            </div>
            <div class="filter-group">
                <label>📅 Período </label>
                <div id="mesesDiv" class="btn-group-months"></div>
            </div>
        </section>

        <section class="kpi-grid">
            <div class="card highlight">
                <h3>Total Atendimentos</h3>
                <p id="total">0</p>
            </div>
            <div class="card highlight">
                <h3>Faturamento Total</h3>
                <p id="fat">R$ 0,00</p>
            </div>
            <div class="card highlight">
                <h3>Eficiência vs Meta</h3>
                <p id="meta">0%</p>
            </div>
        </section>

        <section class="dashboard-grid">
            <div class="chart-container full-width">
                <div class="chart-header">
                    <h3>Tendência de Atendimento</h3>
                    <select id="modoMeta">
                        <option value="diario">Visão Diária</option>
                        <option value="mensal">Visão Mensal</option>
                    </select>
                </div>
                <canvas id="chartMeta"></canvas>
            </div>

            <div class="chart-container">
                <h3>Produção Financeira (Turma)</h3>
                <canvas id="chartTurma"></canvas>
            </div>

            <div class="chart-container">
                <h3>Volume de Atendimento (Turma)</h3>
                <canvas id="chartTurmaQtd"></canvas>
            </div>

            
            <div class="chart-container full-width">
                <h3>Ranking de Receita (Procedimento)</h3>
                <canvas id="chartProcedimento"></canvas>
            </div>

            <div class="chart-container full-width">
                <h3>Distribuição por Clínica</h3>
                <canvas id="chartClinica"></canvas>
            </div>
        </section>
    </main>

    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
