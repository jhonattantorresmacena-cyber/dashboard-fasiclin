<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FASICLIN Dashboard PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f5f6fa; margin:0; }

.container { padding:20px; }

.filtros { display:flex; gap:10px; margin-bottom:20px; }

select {
padding:8px;
border-radius:8px;
border:1px solid #ccc;
}

.cards { display:flex; gap:20px; }

.card {
flex:1;
background:#fff;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.valor { color:green; font-size:28px; }

canvas { margin-top:20px; }
</style>
</head>

<body>

<div class="container">

<!-- FILTROS -->
<div class="filtros">
<select id="procedimento"></select>
<select id="clinica"></select>
<select id="turma"></select>
<select id="mes"></select>
</div>

<!-- CARDS -->
<div class="cards">
<div class="card">
Total
<div id="total" class="valor">0</div>
</div>

<div class="card">
Faturamento
<div id="faturamento" class="valor">0</div>
</div>

<div class="card">
Eficiência
<div id="eficiencia" class="valor">0%</div>
</div>
</div>

<canvas id="grafico"></canvas>

</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTV14Ylz2lkaCPJEyR7lJHHbVfO7qD4hGwTaqoCxHC8I1vIuwU_2X0idkNswPkO8tum1kmScpspHo5A/pub?output=csv";

let dados = [];
let chart;

// 🔥 CARREGAR DADOS
async function fetchData() {
try {
const res = await fetch(URL);
const csv = await res.text();

const linhas = csv.split("\n").map(l => l.split(","));
const headers = linhas[0];

dados = linhas.slice(1).map(l => {
let obj = {};
headers.forEach((h,i)=> obj[h.trim()] = l[i]);
return obj;
});

console.log("Dados OK:", dados);

init();

} catch(e){
alert("Erro ao carregar dados");
console.error(e);
}
}

// 🔥 INICIALIZA
function init(){
popularFiltros();
atualizar();
}

// 🔥 POPULAR FILTROS (CORRIGIDO)
function popularFiltros(){

const proc = document.getElementById("procedimento");
const clin = document.getElementById("clinica");
const turma = document.getElementById("turma");
const mes = document.getElementById("mes");

if(!proc || !clin || !turma || !mes){
console.error("ERRO: Select não encontrado");
return;
}

proc.innerHTML = '<option value="TODOS">Todos</option>';
clin.innerHTML = '<option value="TODOS">Todos</option>';
turma.innerHTML = '<option value="TODOS">Todos</option>';
mes.innerHTML = '<option value="TODOS">Todos</option>';

[...new Set(dados.map(d=>d.PROCEDIMENTO))].forEach(v=>{
if(v) proc.innerHTML += `<option>${v}</option>`;
});

[...new Set(dados.map(d=>d.CLINICA))].forEach(v=>{
if(v) clin.innerHTML += `<option>${v}</option>`;
});

[...new Set(dados.map(d=>d.TURMA))].forEach(v=>{
if(v) turma.innerHTML += `<option>${v}</option>`;
});

[...new Set(dados.map(d=> d.DATA?.substring(3,10)))].forEach(v=>{
if(v) mes.innerHTML += `<option>${v}</option>`;
});

// EVENTOS
proc.onchange = atualizar;
clin.onchange = atualizar;
turma.onchange = atualizar;
mes.onchange = atualizar;
}

// 🔥 ATUALIZA DASHBOARD
function atualizar(){

const p = document.getElementById("procedimento").value;
const c = document.getElementById("clinica").value;
const t = document.getElementById("turma").value;
const m = document.getElementById("mes").value;

let filtrado = dados.filter(d=>{
return (p==="TODOS" || d.PROCEDIMENTO===p) &&
(c==="TODOS" || d.CLINICA===c) &&
(t==="TODOS" || d.TURMA===t) &&
(m==="TODOS" || d.DATA.includes(m));
});

let total = 0;
let faturamento = 0;
let mapa = {};

filtrado.forEach(d=>{
let qtd = parseFloat(d.QUANTIDADE || 0);
let val = parseFloat(d["VALOR TOTAL"]?.replace("R$","").replace(",",".") || 0);

total += qtd;
faturamento += val;

mapa[d.PROCEDIMENTO] = (mapa[d.PROCEDIMENTO] || 0) + val;
});

// CARDS
document.getElementById("total").innerText = total;
document.getElementById("faturamento").innerText = faturamento.toLocaleString("pt-BR");

document.getElementById("eficiencia").innerText =
filtrado.length ? Math.round(total/(filtrado.length*40)*100)+"%" : "0%";

// GRÁFICO
if(chart) chart.destroy();

chart = new Chart(document.getElementById("grafico"), {
type: "bar",
data: {
labels: Object.keys(mapa),
datasets: [{
data: Object.values(mapa)
}]
}
});
}

// START
fetchData();
</script>

</body>
</html>
