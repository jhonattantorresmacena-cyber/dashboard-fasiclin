<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FASICLIN - Gestão Inteligente</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  margin: 0;
}

header {
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.cards {
  display: flex;
  gap: 20px;
  margin-top: 20px;
}

.card {
  flex: 1;
  background: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.valor {
  font-size: 26px;
  color: green;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>FASICLIN • Gestão Inteligente</header>

<div class="container">

  <div class="cards">
    <div class="card">
      <div>Total de Atendimentos</div>
      <div id="total" class="valor">0</div>
    </div>

    <div class="card">
      <div>Faturamento</div>
      <div id="faturamento" class="valor">R$ 0</div>
    </div>

    <div class="card">
      <div>Eficiência</div>
      <div id="eficiencia" class="valor">0%</div>
    </div>
  </div>

</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTV14Ylz2lkaCPJEyR7lJHHbVfO7qD4hGwTaqoCxHC8I1vIuwU_2X0idkNswPkO8tum1kmScpspHo5A/pub?output=csv";

let dados = [];

function toNumber(v) {
  if (!v) return 0;
  return parseFloat(
    v.replace("R$", "")
     .replace(/\./g, "")
     .replace(",", ".")
     .trim()
  ) || 0;
}

async function fetchData() {
  try {
    const res = await fetch(CSV_URL);

    if (!res.ok) {
      throw new Error("Erro ao acessar planilha");
    }

    const text = await res.text();

    const linhas = text.split("\n").map(l => l.split(","));

    dados = linhas.slice(1)
      .map(l => ({
        DATA: l[0]?.trim(),
        PROCEDIMENTO: l[1]?.trim(),
        QUANTIDADE: l[2]?.trim(),
        VALOR: l[4]?.trim()
      }))
      .filter(l =>
        l.DATA &&
        l.PROCEDIMENTO &&
        !l.DATA.includes("TOTAL") &&
        !l.PROCEDIMENTO.includes("CLINICA") &&
        !isNaN(parseInt(l.QUANTIDADE))
      );

    console.log("Dados tratados:", dados);

    atualizarDashboard();

  } catch (e) {
    alert("Erro ao carregar dados da planilha");
    console.error(e);
  }
}

function atualizarDashboard() {

  let total = 0;
  let faturamento = 0;

  dados.forEach(d => {
    const qtd = parseInt(d.QUANTIDADE) || 0;
    const valor = toNumber(d.VALOR);

    total += qtd;
    faturamento += valor;
  });

  const eficiencia = total > 0 ? (faturamento / total) : 0;

  document.getElementById("total").innerText = total;
  document.getElementById("faturamento").innerText =
    "R$ " + faturamento.toLocaleString("pt-BR");

  document.getElementById("eficiencia").innerText =
    eficiencia.toFixed(2) + "%";
}

// INICIAR
fetchData();
</script>

</body>
</html>
