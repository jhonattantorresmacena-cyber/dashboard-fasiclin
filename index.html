<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FASICLIN - Gestão Premium</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --fasiclin-green: #299947;
            --fasiclin-gray: #a395a8;
            --primary-text: #333;
            --bg-color: #f0f2f5;
            --card-bg: #fff;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Poppins';
            background: var(--bg-color);
            margin: 0;
        }

        header {
            background: #fff;
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, .05);
        }

        .btn {
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            border: none;
        }

        .btn-export {
            background: var(--fasiclin-green);
            color: #fff;
        }

        .container {
            padding: 25px 5%;
            max-width: 1600px;
            margin: auto;
        }

        .card {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            gap: 20px;
        }

        .stat {
            flex: 1;
            text-align: center;
        }

        .stat p {
            font-size: 30px;
            color: var(--fasiclin-green);
        }

        select {
            padding: 10px;
            border-radius: 20px;
            width: 100%;
        }

        canvas {
            max-height: 400px;
        }

        #loadingOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>

    <div id="loadingOverlay">Carregando dados...</div>

    <header>
        <h2>FASICLIN Dashboard</h2>
        <button onclick="exportToPDF()" class="btn btn-export">Exportar PDF</button>
    </header>

    <div class="container">

        <div class="card">
            <select id="procSelect" onchange="filterData()">
                <option value="TODOS">Todos</option>
            </select>
        </div>

        <div class="stats">
            <div class="card stat">Qtd: <p id="qtd">0</p>
            </div>
            <div class="card stat">R$: <p id="valor">0</p>
            </div>
            <div class="card stat">%: <p id="meta">0%</p>
            </div>
        </div>

        <div class="card">
            <canvas id="chart"></canvas>
        </div>

    </div>

    <script>
        let rawData = [];
        let filteredData = [];
        let selectedMonth = 'TODOS';
        let myCharts = {};

        // 🔗 GOOGLE SHEETS
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/1M2TGuEkzyOXgcxGK9ujYDknIgjvWlveHHsSpqnvv5j4/export?format=csv&gid=1575732509";

        window.onload = fetchDataFromSheets;;

        // 🔥 BUSCA DADOS
        async function fetchDataFromSheets() {
    const loading = document.getElementById('loadingOverlay');
    loading.style.display = 'flex';
    
    try {
        const response = await fetch(SHEET_URL);
        const csvText = await response.text();

        const workbook = XLSX.read(csvText, { type: 'string' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        
        rawData = XLSX.utils.sheet_to_json(sheet);

        console.log("DADOS:", rawData);

        if (!rawData.length) {
            throw new Error("Planilha vazia");
        }

        populate();
        update(rawData);

    } catch (error) {
        console.error(error);
        alert("Erro ao carregar dados da planilha");
    }

    loading.style.display = 'none';
}

        // 📌 DROPDOWN
        function populate() {
            let select = document.getElementById('procSelect');
            let procs = [...new Set(rawData.map(r => getVal(r, 'PROCEDIMENTO')))].sort();

            select.innerHTML = '<option value="TODOS">Todos</option>';

            procs.forEach(p => {
                if (p) select.innerHTML += `<option>${p}</option>`;
            });
        }

        // 🔍 FILTRO
        function filterData() {
            let p = document.getElementById('procSelect').value;

            let f = rawData.filter(r => {
                return p === "TODOS" || getVal(r, 'PROCEDIMENTO') === p;
            });

            update(f);
        }

        // 📊 ATUALIZA DASHBOARD
        function update(data) {

            let qtd = 0;
            let val = 0;
            let map = {};

            data.forEach(r => {
                let q = cleanNum(getVal(r, 'QUANTIDADE'));
                let v = cleanNum(getVal(r, 'VALOR TOTAL'));

                qtd += q;
                val += v;

                let proc = getVal(r, 'PROCEDIMENTO');
                map[proc] = (map[proc] || 0) + v;
            });

            document.getElementById('qtd').innerText = qtd;
            document.getElementById('valor').innerText = val.toLocaleString('pt-BR');

            document.getElementById('meta').innerText = data.length > 0 ? Math.round(qtd / (data.length * 40) * 100) + '%' : '0%';

            let labels = Object.keys(map);
            let values = Object.values(map);

            if (chart) chart.destroy();

            chart = new Chart(document.getElementById('chart'), {
                type: 'bar',
                data: { labels, datasets: [{ data: values, backgroundColor: '#299947' }] }
            });
        }

        // 🧠 FUNÇÕES AUXILIARES
        function getVal(row, label) {
            const key = Object.keys(row).find(k =>
                k.toUpperCase().replace(/\s/g, '').includes(label.replace(/\s/g, ''))
            );
            return key ? row[key] : "";
        }

        function cleanNum(val) {
            if (!val) return 0;
            return parseFloat(val.toString().replace(/[R$\s.]/g, '').replace(',', '.')) || 0;
        }

        // 📄 EXPORT PDF
        async function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const canvas = await html2canvas(document.body);
            const pdf = new jsPDF();

            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0);
            pdf.save("dashboard.pdf");
        }

    </script>

</body>

</html>
