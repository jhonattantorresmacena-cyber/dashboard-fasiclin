<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard Clínica</title>

<link rel="stylesheet" href="assets/css/styles.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div id="loading">
  <div class="spinner"></div>
</div>
<header>
    <div class="header-logo"><img src="assets/image/logo.png" alt="Logo FASICLIN" /></div>
    <div class="btn-group">
        <button class="export" onclick="exportPDF()">📄 Exportar PDF</button>
        <input type="file" id="fileInput" accept=".xlsx, .xls" style="display:none">
    </div>
</header>
<div class="container">

<h1>Dashboard Clínica</h1>

<div class="filters">
  <select id="proc"></select>
  <div id="mesesDiv"></div>
</div>

<div class="cards">
  <div class="card">
    <h3>Total Atendimentos</h3>
    <p id="total"></p>
  </div>

  <div class="card">
    <h3>Faturamento</h3>
    <p id="fat"></p>
  </div>

  <div class="card">
    <h3>Eficiência</h3>
    <p id="meta"></p>
  </div>
</div>

<div class="chart">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <h3>Tendência</h3>

    <select id="modoMeta">
      <option value="diario">Meta Diária</option>
      <option value="mensal">Meta Mensal</option>
    </select>
  </div>

  <canvas id="chartMeta"></canvas>
</div>

<div class="grid-2">
  <div class="chart">
    <h3>Produção por Turma</h3>
    <canvas id="chartTurma"></canvas>
  </div>

  <div class="chart">
    <h3>atendimento por Turma</h3>
    <canvas id="chartClinica"></canvas>
  </div>
</div>

<div class="grid-2">
  <div class="chart">
    <h3>Distribuição por Clínica</h3>
    <canvas id="chartClinica"></canvas>
  </div>
</div>

<div class="chart">
  <h3>Ranking de Receita</h3>
  <canvas id="chartProcedimento"></canvas>
</div>

</div>

<script type="module" src="assets/js/app.js"></script>

</body>
</html>
