<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FASICLIN - Gestão Premium</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root { 
--fasiclin-green: #299947;
--fasiclin-gray: #a395a8;
--bg-color: #f0f2f5;
--card-bg: #fff;
}

body { font-family:'Poppins'; background:var(--bg-color); margin:0; }

header {
background:#fff;
padding:10px 5%;
display:flex;
justify-content:space-between;
box-shadow:0 2px 5px rgba(0,0,0,.05);
}

.container { padding:25px 5%; max-width:1400px; margin:auto; }

.card {
background:#fff;
padding:20px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.stats { display:flex; gap:20px; }

.stat { flex:1; text-align:center; }

.stat p { font-size:30px; color:var(--fasiclin-green); }

select {
padding:10px;
border-radius:20px;
width:100%;
}

#loadingOverlay {
display:none;
position:fixed;
top:0;left:0;width:100%;height:100%;
background:#fff;
align-items:center;
justify-content:center;
font-size:20px;
}
</style>
</head>

<body>

<div id="loadingOverlay">Carregando dados...</div>

<header>
<h2>FASICLIN Dashboard</h2>
</header>

<div class="container">

<div class="card">
<select id="procSelect"></select>
</div>

<div class="stats">
<div class="card stat">Qtd: <p id="qtd">0</p></div>
<div class="card stat">R$: <p id="valor">0</p></div>
<div class="card stat">%: <p id="meta">0%</p></div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

</div>

<script>

// 🔗 LINK CORRETO DO GOOGLE SHEETS
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTV14Ylz2lkaCPJEyR7lJHHbVfO7qD4hGwTaqoCxHC8I1vIuwU_2X0idkNswPkO8tum1kmScpspHo5A/pub?output=csv";

// 🔢 VARIÁVEIS
let rawData = [];
let chart = null;

// 📌 ELEMENTOS DOM
let qtdEl = document.getElementById('qtd');
let valorEl = document.getElementById('valor');
let metaEl = document.getElementById('meta');

// 🚀 INICIO
window.onload = fetchDataFromSheets;

// 🔥 BUSCA DADOS
async function fetchDataFromSheets(){

document.getElementById('loadingOverlay').style.display='flex';

try{

const response = await fetch(SHEET_URL);
const csv = await response.text();

const workbook = XLSX.read(csv, {type:'string'});
const sheet = workbook.Sheets[workbook.SheetNames[0]];

rawData = XLSX.utils.sheet_to_json(sheet);

console.log("Dados carregados:", rawData);

if(!rawData.length) throw "Planilha vazia";

populate();
update(rawData);

}catch(e){
console.error(e);
alert("Erro ao carregar planilha");
}

document.getElementById('loadingOverlay').style.display='none';
}

// 📌 DROPDOWN
function populate(){

let select = document.getElementById('procSelect');

let procs = [...new Set(rawData.map(r => getVal(r,'PROCEDIMENTO')))].sort();

select.innerHTML='<option value="TODOS">Todos</option>';

procs.forEach(p=>{
if(p) select.innerHTML+=`<option>${p}</option>`;
});

select.onchange = filterData;
}

// 🔍 FILTRO
function filterData(){

let p = document.getElementById('procSelect').value;

let data = rawData.filter(r=>{
return p==="TODOS" || getVal(r,'PROCEDIMENTO')===p;
});

update(data);
}

// 📊 ATUALIZA DASHBOARD
function update(data){

let qtd=0;
let val=0;
let map={};

data.forEach(r=>{

let q = cleanNum(getVal(r,'QUANTIDADE'));
let v = cleanNum(getVal(r,'VALOR TOTAL'));

qtd += q;
val += v;

let proc = getVal(r,'PROCEDIMENTO') || 'OUTROS';
map[proc] = (map[proc] || 0) + v;
});

// CARDS
qtdEl.innerText = qtd.toLocaleString('pt-BR');
valorEl.innerText = val.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
metaEl.innerText = data.length ? Math.round((qtd/(data.length*40))*100)+'%' : '0%';

// GRÁFICO
let labels = Object.keys(map);
let values = Object.values(map);

if(chart) chart.destroy();

chart = new Chart(document.getElementById('chart'),{
type:'bar',
data:{
labels:labels,
datasets:[{
label:'Faturamento',
data:values,
backgroundColor:'#299947',
borderRadius:8
}]
},
options:{
responsive:true,
plugins:{legend:{display:false}}
}
});
}

// 🧠 AUXILIARES
function getVal(row,label){
const key = Object.keys(row).find(k =>
k.toUpperCase().replace(/\s/g,'').includes(label.replace(/\s/g,'')));
return key ? row[key] : "";
}

function cleanNum(val){
if(!val) return 0;
return parseFloat(val.toString().replace(/[R$\s.]/g,'').replace(',','.')) || 0;
}

</script>

</body>
</html>
