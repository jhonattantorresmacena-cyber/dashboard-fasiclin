<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FASICLIN - Dashboard Avançado</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f0f2f5; margin:0; }

.container { padding:20px; max-width:1400px; margin:auto; }

.card { background:#fff; padding:20px; border-radius:15px; margin-bottom:20px; box-shadow:0 4px 10px rgba(0,0,0,.05); }

.filters { display:flex; gap:10px; flex-wrap:wrap; }

select { padding:10px; border-radius:10px; }

.stats { display:flex; gap:20px; }
.stat { flex:1; text-align:center; }

.stat h2 { color:#299947; }

.grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }

canvas { max-height:350px; }
</style>
</head>

<body>

<div class="container">

<div class="card filters">
<select id="proc"></select>
<select id="clinica"></select>
<select id="turma"></select>
<select id="mes"></select>
</div>

<div class="stats">
<div class="card stat"><p>Total</p><h2 id="qtd">0</h2></div>
<div class="card stat"><p>Faturamento</p><h2 id="valor">0</h2></div>
<div class="card stat"><p>Eficiência</p><h2 id="meta">0%</h2></div>
</div>

<div class="card">
<canvas id="metaChart"></canvas>
</div>

<div class="grid">
<div class="card"><canvas id="procChart"></canvas></div>
<div class="card"><canvas id="turmaChart"></canvas></div>
<div class="card"><canvas id="clinicaChart"></canvas></div>
</div>

</div>

<script>

// 🔗 SEU LINK (JÁ CORRETO)
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTV14Ylz2lkaCPJEyR7lJHHbVfO7qD4hGwTaqoCxHC8I1vIuwU_2X0idkNswPkO8tum1kmScpspHo5A/pub?output=csv";

let rawData=[];
let charts={};

window.onload = fetchData;

async function fetchData(){
const res = await fetch(SHEET_URL);
const text = await res.text();

const rows = text.split("\n").map(r=>r.split(","));
const headers = rows[0];

rawData = rows.slice(1).map(r=>{
let obj={};
headers.forEach((h,i)=>obj[h.trim()]=r[i]);
return obj;
});

init();
}

// 🎯 INIT
function init(){
fillSelect("proc","PROCEDIMENTO");
fillSelect("clinica","CLINICA");
fillSelect("turma","TURMA");
fillMonths();

update();
}

// 🔽 SELECTS
function fillSelect(id,col){
let values=[...new Set(rawData.map(r=>r[col]))];
let el=document.getElementById(id);

el.innerHTML='<option value="TODOS">Todos</option>';
values.forEach(v=>{ if(v) el.innerHTML+=`<option>${v}</option>` });

el.onchange=update;
}

function fillMonths(){
let meses=[...new Set(rawData.map(r=>{
let d=parseDate(r.DATA);
return d?d.toLocaleString('pt-BR',{month:'short',year:'numeric'}):null;
}))].filter(Boolean);

let el=document.getElementById("mes");
el.innerHTML='<option value="TODOS">Todos</option>';

meses.forEach(m=>el.innerHTML+=`<option>${m}</option>`);

el.onchange=update;
}

// 🔍 FILTRO
function getFiltered(){
let p=document.getElementById("proc").value;
let c=document.getElementById("clinica").value;
let t=document.getElementById("turma").value;
let m=document.getElementById("mes").value;

return rawData.filter(r=>{
let d=parseDate(r.DATA);
let mes=d?d.toLocaleString('pt-BR',{month:'short',year:'numeric'}):"";

return (p==="TODOS"||r.PROCEDIMENTO===p) &&
(c==="TODOS"||r.CLINICA===c) &&
(t==="TODOS"||r.TURMA===t) &&
(m==="TODOS"||mes===m);
});
}

// 📊 UPDATE
function update(){

let data=getFiltered();

let qtd=0,val=0;
let procMap={}, turmaMap={}, clinicaMap={}, metaMap={};

data.forEach(r=>{
let q=num(r.QUANTIDADE);
let v=num(r["VALOR TOTAL"]);

qtd+=q;
val+=v;

procMap[r.PROCEDIMENTO]=(procMap[r.PROCEDIMENTO]||0)+v;
turmaMap[r.TURMA]=(turmaMap[r.TURMA]||0)+q;
clinicaMap[r.CLINICA]=(clinicaMap[r.CLINICA]||0)+q;

let d=parseDate(r.DATA);
if(d){
let ds=d.toLocaleDateString();
if(!metaMap[ds]) metaMap[ds]={r:0,m:40};
metaMap[ds].r+=q;
}
});

// CARDS
qtdEl.innerText=qtd;
valorEl.innerText=val.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
metaEl.innerText=data.length?Math.round(qtd/(data.length*40)*100)+'%':'0%';

// CHARTS
render(metaMap,procMap,turmaMap,clinicaMap);
}

// 📈 CHARTS
function render(metaMap,procMap,turmaMap,clinicaMap){

Object.values(charts).forEach(c=>c.destroy());

charts.meta=new Chart(metaChart,{
type:'line',
data:{
labels:Object.keys(metaMap),
datasets:[
{label:'Real',data:Object.values(metaMap).map(x=>x.r),borderColor:'green'},
{label:'Meta',data:Object.values(metaMap).map(x=>x.m),borderColor:'red'}
]
}
});

charts.proc=new Chart(procChart,{
type:'bar',
data:{labels:Object.keys(procMap),datasets:[{data:Object.values(procMap),backgroundColor:'#299947'}]}
});

charts.turma=new Chart(turmaChart,{
type:'pie',
data:{labels:Object.keys(turmaMap),datasets:[{data:Object.values(turmaMap)}]}
});

charts.clinica=new Chart(clinicaChart,{
type:'doughnut',
data:{labels:Object.keys(clinicaMap),datasets:[{data:Object.values(clinicaMap)}]}
});
}

// 🧠 HELPERS
function num(v){
if(!v) return 0;
return parseFloat(v.replace(/[R$\s.]/g,'').replace(',','.'))||0;
}

function parseDate(d){
if(!d) return null;
let p=d.split('/');
return p.length===3?new Date(p[2],p[1]-1,p[0]):new Date(d);
}

</script>

</body>
</html>
