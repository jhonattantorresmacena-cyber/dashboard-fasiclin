<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FASICLIN PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{font-family:Poppins;background:#f4f6f9;margin:0}
.container{padding:20px}
.card{background:#fff;padding:20px;border-radius:15px;margin-bottom:20px;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.filters{display:flex;gap:10px;flex-wrap:wrap}
select{padding:10px;border-radius:10px}
.stats{display:flex;gap:20px}
.stat{flex:1;text-align:center;font-weight: 500;}
.stat p{font-size:28px;color:#299947}
canvas{max-height:350px}
</style>
</head>

<body>

<div class="container">

<div class="card filters">
<select id="proc"></select>
<select id="clinica"></select>
<select id="turma"></select>
<select id="mes"></select>
</div>

<div class="stats">
<div class="card stat">Total<p id="qtd">0</p></div>
<div class="card stat">Faturamento<p id="valor">0</p></div>
<div class="card stat">Eficiência<p id="meta">0%</p></div>
</div>

<div class="card"><canvas id="linha"></canvas></div>
<div class="card"><canvas id="barra"></canvas></div>
<div class="card"><canvas id="pizza"></canvas></div>

</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTV14Ylz2lkaCPJEyR7lJHHbVfO7qD4hGwTaqoCxHC8I1vIuwU_2X0idkNswPkO8tum1kmScpspHo5A/pub?output=csv";

let data = [];
let chart = null;

// 🔥 INICIO SEGURO
window.onload = () => {
    try {
        fetchData();
    } catch (e) {
        console.error("Erro geral:", e);
        alert("Erro ao iniciar dashboard");
    }
};

// 🔥 FETCH ROBUSTO
async function fetchData(){

    try{
        const res = await fetch(URL);

        if(!res.ok){
            throw new Error("Erro HTTP: " + res.status);
        }

        const csv = await res.text();

        const wb = XLSX.read(csv,{type:'string'});
        const sheet = wb.Sheets[wb.SheetNames[0]];

        data = XLSX.utils.sheet_to_json(sheet);

        if(!data || data.length === 0){
            throw new Error("Planilha vazia");
        }

        console.log("Dados OK:", data);

        init();

    }catch(e){
        console.error("Erro ao carregar:", e);
        alert("Erro ao carregar dados da planilha");
    }
}

// 🔧 INIT
function init(){
    populate();
    update(data);
}

// 📌 DROPDOWN
function populate(){
    const select = document.getElementById('procSelect');

    const procs = [...new Set(data.map(r => getVal(r,'PROCEDIMENTO')))].sort();

    select.innerHTML = '<option value="TODOS">Todos</option>';

    procs.forEach(p=>{
        if(p){
            select.innerHTML += `<option>${p}</option>`;
        }
    });

    select.onchange = filterData;
}

// 🔍 FILTRO
function filterData(){
    const p = document.getElementById('procSelect').value;

    const filtered = data.filter(r=>{
        return p === "TODOS" || getVal(r,'PROCEDIMENTO') === p;
    });

    update(filtered);
}

// 📊 DASHBOARD
function update(d){

    let qtd = 0;
    let val = 0;
    let map = {};

    d.forEach(r=>{
        const q = cleanNum(getVal(r,'QUANTIDADE'));
        const v = cleanNum(getVal(r,'VALOR TOTAL'));

        qtd += q;
        val += v;

        const proc = getVal(r,'PROCEDIMENTO') || "OUTROS";
        map[proc] = (map[proc] || 0) + v;
    });

    // DOM seguro
    document.getElementById('qtd').innerText = qtd.toLocaleString('pt-BR');
    document.getElementById('valor').innerText = val.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    document.getElementById('meta').innerText = d.length ? Math.round((qtd/(d.length*40))*100)+'%' : '0%';

    renderChart(map);
}

// 📊 GRÁFICO
function renderChart(map){

    const labels = Object.keys(map);
    const values = Object.values(map);

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById('chart'),{
        type:'bar',
        data:{
            labels: labels,
            datasets:[{
                label:'Faturamento',
                data: values,
                backgroundColor:'#299947'
            }]
        },
        options:{
            responsive:true,
            plugins:{
                legend:{display:false}
            }
        }
    });
}

// 🧠 AUX
function getVal(row,label){
    const key = Object.keys(row).find(k =>
        k.toUpperCase().replace(/\s/g,'')
        .includes(label.replace(/\s/g,'')));

    return key ? row[key] : "";
}

function cleanNum(val){
    if(!val) return 0;
    return parseFloat(
        val.toString()
        .replace(/[R$\s.]/g,'')
        .replace(',','.')
    ) || 0;
}

</script>

</body>
</html>
