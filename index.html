<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FASICLIN • Gestão Inteligente</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f4f6f9; margin:0; }
header { padding:20px; font-size:22px; font-weight:bold; }

.container { padding:20px; }

.cards {
  display:flex;
  gap:20px;
  margin-top:20px;
}

.card {
  flex:1;
  background:white;
  padding:20px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.valor {
  font-size:26px;
  color:green;
}

.grid {
  display:flex;
  gap:20px;
  margin-top:20px;
}

.box {
  flex:1;
  background:white;
  padding:20px;
  border-radius:10px;
}

ul { list-style:none; padding:0; }
li { padding:5px 0; }
</style>
</head>

<body>

<header>FASICLIN • Gestão Inteligente</header>

<div class="container">

<div class="cards">
  <div class="card">
    <div>Total</div>
    <div id="total" class="valor">0</div>
  </div>

  <div class="card">
    <div>Faturamento</div>
    <div id="faturamento" class="valor">R$ 0</div>
  </div>

  <div class="card">
    <div>Eficiência</div>
    <div id="eficiencia" class="valor">0%</div>
  </div>
</div>

<div class="grid">
  <div class="box">
    <h3>Faturamento por Procedimento</h3>
    <canvas id="grafico"></canvas>
  </div>

  <div class="box">
    <h3>Ranking</h3>
    <ul id="ranking"></ul>
  </div>
</div>

</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTV14Ylz2lkaCPJEyR7lJHHbVfO7qD4hGwTaqoCxHC8I1vIuwU_2X0idkNswPkO8tum1kmScpspHo5A/pub?output=csv";

let dados = [];
let chart;

// ===== FUNÇÃO SEGURA =====
function toNumber(v){
  if(!v) return 0;
  return parseFloat(
    v.replace("R$","")
     .replace(/\./g,"")
     .replace(",",".")
     .trim()
  ) || 0;
}

// ===== FETCH =====
async function fetchData(){
  try{
    const res = await fetch(CSV_URL);
    const text = await res.text();

    const linhas = text.split("\n");

    dados = [];

    linhas.forEach(linha => {

      const col = linha.split(",");

      // 🔴 PROTEÇÃO TOTAL
      if(col.length < 5) return;
      if(!col[0] || col[0].includes("TOTAL")) return;
      if(!col[1] || col[1].includes("CLINICA")) return;

      const qtd = parseInt(col[2]);
      const valor = toNumber(col[4]);

      if(isNaN(qtd) || valor <= 0) return;

      dados.push({
        DATA: col[0],
        PROCEDIMENTO: col[1],
        QUANTIDADE: qtd,
        VALOR: valor
      });

    });

    console.log("Dados limpos:", dados);

    atualizar();

  }catch(e){
    alert("Erro ao carregar dados");
    console.error(e);
  }
}

// ===== DASHBOARD =====
function atualizar(){

  let total = 0;
  let faturamento = 0;
  let mapa = {};

  dados.forEach(d => {

    total += d.QUANTIDADE;
    faturamento += d.VALOR;

    if(!mapa[d.PROCEDIMENTO]){
      mapa[d.PROCEDIMENTO] = 0;
    }

    mapa[d.PROCEDIMENTO] += d.VALOR;
  });

  const eficiencia = total ? faturamento / total : 0;

  // KPIs
  document.getElementById("total").innerText = total;
  document.getElementById("faturamento").innerText =
    "R$ " + faturamento.toLocaleString("pt-BR");

  document.getElementById("eficiencia").innerText =
    eficiencia.toFixed(2) + "%";

  renderGrafico(mapa);
  renderRanking(mapa);
}

// ===== GRÁFICO SEGURO =====
function renderGrafico(mapa){

  const labels = Object.keys(mapa);
  const valores = Object.values(mapa);

  if(labels.length === 0) return;

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("grafico"), {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Faturamento",
        data: valores
      }]
    }
  });
}

// ===== RANKING =====
function renderRanking(mapa){

  const lista = Object.entries(mapa)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,10);

  const el = document.getElementById("ranking");
  el.innerHTML = "";

  lista.forEach(item => {
    el.innerHTML += `<li>${item[0]} - R$ ${item[1].toLocaleString("pt-BR")}</li>`;
  });
}

// INIT
fetchData();
</script>

</body>
</html>
